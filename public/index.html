<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Couple Survival</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="game-root"></div>
    <div id="authorTag">Couple Survival</div>

    <div id="ui-overlay">
        <div id="topHud">
            <div id="backpackCard" aria-label="Backpack">
                <div id="backpackTitle">Backpack</div>
                <div id="backpackInfo" aria-live="polite">Backpack empty</div>
            </div>
            <div id="loveMeterWrap">
                <span>Health</span>
                <div id="loveMeter"><div id="loveFill"></div></div>
            </div>
            <div id="loveStatus">Love Status: 100%</div>
            <div id="zoomControls">
                <button id="btnZoomOut" type="button" aria-label="Zoom out">-</button>
                <button id="btnZoomIn" type="button" aria-label="Zoom in">+</button>
            </div>
        </div>
        <button id="miniMapWrap" type="button" aria-label="Open map">
            <canvas id="miniMapCanvas" width="168" height="168"></canvas>
        </button>
        <div id="fullMapModal" aria-hidden="true">
            <div id="fullMapCard">
                <button id="btnCloseFullMap" type="button" aria-label="Close map">✕</button>
                <canvas id="fullMapCanvas" width="700" height="700"></canvas>
            </div>
        </div>

        <div id="interactionPanel">
            <button id="btnDrive" class="actionBtn">Drive</button>
            <button id="btnSit" class="actionBtn">Sit</button>
            <button id="btnExitCar" class="actionBtn">Exit Car</button>
            <button id="btnOpenGate" class="actionBtn">Open Gate</button>
            <button id="btnCollect" class="actionBtn">Collect</button>
            <button id="btnShoot" class="actionBtn">Shoot</button>
            <button id="btnEat" class="actionBtn">Eat</button>
            <button id="btnBuildMode" class="actionBtn">Build Mode</button>
            <button id="btnPlaceBlock" class="actionBtn">Place Block</button>
            <button id="btnEnter" class="actionBtn">Enter</button>
            <button id="btnRemoveBlock" class="actionBtn">Remove Block</button>
            <button id="btnCycleMaterial" class="actionBtn">Material: Brick</button>
            <button id="btnCycleWeapon" class="actionBtn">Weapon: Pistol</button>
        </div>

        <div id="buildInfo" aria-live="polite">Build: OFF</div>
        <div id="mobileMaterialPanel" aria-live="polite">
            <div><span>brick:</span> <strong id="matBrickCount">0</strong></div>
            <div><span>wood:</span> <strong id="matWoodCount">0</strong></div>
            <div><span>glass:</span> <strong id="matGlassCount">0</strong></div>
            <div><span>steel:</span> <strong id="matSteelCount">0</strong></div>
            <div><span>apple:</span> <strong id="foodAppleCount">0</strong></div>
            <div><span>strawberry:</span> <strong id="foodStrawberryCount">0</strong></div>
            <div><span>blueberry:</span> <strong id="foodBlueberryCount">0</strong></div>
            <div><span>meat:</span> <strong id="foodMeatCount">0</strong></div>
        </div>
        <div id="emojiBar">
            <button class="emojiBtn" data-emoji="❤️">❤️</button>
            <button class="emojiBtn" data-emoji="😂">😂</button>
            <button class="emojiBtn" data-emoji="😍">😍</button>
            <button class="emojiBtn" data-emoji="😎">😎</button>
            <button class="emojiBtn" data-emoji="😢">😢</button>
        </div>
        <button id="btnMicToggle" type="button" aria-label="Toggle voice chat">🎤</button>
        <button id="btnChatToggle" type="button" aria-label="Toggle chat">💬</button>

        <form id="chatForm" autocomplete="off">
            <input id="chatInput" placeholder="Say something..." maxlength="90" />
            <button id="chatSend" type="submit">Send</button>
        </form>

        <div id="mobileJoystick" aria-hidden="true">
            <div id="joystickKnob"></div>
        </div>
        <button id="btnMobileBuildAction" class="mobileBuildBtn" type="button">Place</button>

        <div id="drivePad" aria-hidden="true">
            <button id="driveUp" class="driveBtn">↑</button>
            <div class="driveRow">
                <button id="driveLeft" class="driveBtn">←</button>
                <button id="driveRight" class="driveBtn">→</button>
            </div>
            <button id="driveDown" class="driveBtn">↓</button>
        </div>

        <div id="gameOverOverlay" aria-hidden="true">
            <div id="gameOverCard">
                <h2 id="gameOverTitle">You did not survive.</h2>
                <p id="gameOverReason">Restart and protect each other.</p>
                <button id="btnRestartGame" type="button">Restart</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
