<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Couple GTA World</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="game-root"></div>

    <div id="ui-overlay">
        <div id="topBar">
            <div id="missionBox">Mission: Meet inside the house</div>
            <div id="loveMeterWrap">
                <span>Love</span>
                <div id="loveMeter"><div id="loveFill"></div></div>
            </div>
        </div>

        <div id="interactionPanel">
            <button id="btnDrive" class="actionBtn">Drive</button>
            <button id="btnSit" class="actionBtn">Sit</button>
            <button id="btnExitCar" class="actionBtn">Exit Car</button>
            <button id="btnOpenDoor" class="actionBtn">Open Door</button>
            <button id="btnPickFlower" class="actionBtn">Pick Flower</button>
            <button id="btnGiveFlower" class="actionBtn">Give Flower</button>
            <button id="btnAcceptFlower" class="actionBtn">Accept Flower</button>
        </div>

        <div id="emojiBar">
            <button class="emojiBtn" data-emoji="❤️">❤️</button>
            <button class="emojiBtn" data-emoji="😂">😂</button>
            <button class="emojiBtn" data-emoji="😍">😍</button>
            <button class="emojiBtn" data-emoji="😎">😎</button>
            <button class="emojiBtn" data-emoji="😢">😢</button>
        </div>

        <form id="chatForm" autocomplete="off">
            <input id="chatInput" placeholder="Say something..." maxlength="90" />
            <button id="chatSend" type="submit">Send</button>
        </form>

        <div id="mobileJoystick" aria-hidden="true">
            <div id="joystickKnob"></div>
        </div>

        <div id="drivePad" aria-hidden="true">
            <button id="driveUp" class="driveBtn">↑</button>
            <div class="driveRow">
                <button id="driveLeft" class="driveBtn">←</button>
                <button id="driveRight" class="driveBtn">→</button>
            </div>
            <button id="driveDown" class="driveBtn">↓</button>
        </div>

        <div id="gameOverOverlay" aria-hidden="true">
            <div id="gameOverCard">
                <h2>you killed my nusaibar ammu</h2>
                <button id="btnRestartGame" type="button">Restart</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
