<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Couple GTA World</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="game-root"></div>

    <div id="ui-overlay">
        <div id="topBar">
            <div id="missionBox">Mission: Meet inside the house</div>
            <div id="loveMeterWrap">
                <span>Love</span>
                <div id="loveMeter"><div id="loveFill"></div></div>
            </div>
        </div>

        <form id="chatForm" autocomplete="off">
            <input id="chatInput" placeholder="Say something..." maxlength="90" />
            <button id="chatSend" type="submit">Send</button>
        </form>

        <div id="mobileJoystick" aria-hidden="true">
            <div id="joystickKnob"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
